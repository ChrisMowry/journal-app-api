# Controls when the action will run. Invokes the workflow on push events but only for the main branch
on:
  push:
    branches: [ main ]
  workflow_dispatch: # allows manual deployment to prod
    inputs:
      environment:
        description: 'Prod Deployment Environment'
        required: true
        default: 'prd'

env:
  AWS_REGION : 'us-west-2'

# Permission can be added at job level or workflow level
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Development Terraform Resources
        run: echo "Validate" # Add command to validate Terraform resources here, e.g., terraform validate
      - name: Validate Production Terraform Resources
        run: echo "Validate" # Add command to validate Terraform resources here, e.g., terraform validate
      - name: Plan Development Terraform Resources
        run: echo "Plan" # Add command to plan Terraform resources here, e.g., terraform plan
      - name: Plan Production Terraform Resources
        run: echo "Plan" # Add command to plan Terraform resources here, e.g.,
      - name: Tests
        run: cd blue-spot-service && npm ci && npm run test

  dev-deploy:
    needs: test
    if: github.ref == 'refs/heads/main' # Runs only on main branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::452045479775:role/GitHubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
        # Add deploy to dev steps here

  prd-deploy:
    needs: dev-deploy
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prd' }}  # Triggered manually for prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::452045479775:role/GitHubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      # Add deploy to prd steps here
